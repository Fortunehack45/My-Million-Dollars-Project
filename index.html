<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Performance Hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://firestore.googleapis.com" />
  
  <meta name="apple-mobile-web-app-title" content="Argus Protocol" />
  <meta name="application-name" content="Argus Protocol" />
  <meta name="theme-color" content="#09090b" />
  <meta name="msapplication-TileColor" content="#09090b" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- SEO: Primary Metadata -->
  <title>Argus Protocol</title>
  <meta name="title" content="Argus Protocol" />
  <meta name="description" content="Institutional infrastructure for the decentralized web." />
  <meta name="author" content="Argus Collective" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="google-site-verification" content="wJy4zI3CL2dvJWXdSuNmweU6d9fEdjUOuDPWhDF5fu8" />

  <!-- SEO: Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Argus Protocol",
    "alternateName": ["Argus", "Argus Network"],
    "url": "https://argus-protocol.xyz/"
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Argus Protocol",
    "url": "https://argus-protocol.xyz/",
    "logo": "https://argus-protocol.xyz/favicon.svg",
    "sameAs": ["https://x.com/ArgusProtocol"]
  }
  </script>

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://argus-protocol.xyz/" />
  <meta property="og:title" content="Argus Protocol | Institutional Compute Infrastructure" />
  <meta property="og:site_name" content="Argus Protocol" />
  <meta property="og:description"
    content="Argus Protocol is the premier institutional-grade compute layer for the decentralized web. Deploy high-performance validator nodes, mine ARG credits securely, and power the next generation multi-chain economy." />
  <meta property="og:image" content="https://argus-protocol.xyz/og-preview.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://argus-protocol.xyz/" />
  <meta name="twitter:title" content="Argus Protocol | Institutional Compute Infrastructure" />
  <meta name="twitter:description"
    content="The institutional-grade infrastructure layer for the decentralized web. Deploy high-performance validator nodes and secure the multi-chain economy." />
  <meta name="twitter:image" content="https://argus-protocol.xyz/og-preview.jpg" />
  <meta name="twitter:site" content="@ArgusProtocol" />
  <meta name="twitter:creator" content="@ArgusProtocol" />
  <meta name="twitter:creator" content="@ArgusProtocol" />

  <!-- Build-time Tailwind & Critical Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&family=UnifrakturMaguntia&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'"
  >
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&family=UnifrakturMaguntia&display=swap"
      rel="stylesheet"
    >
  </noscript>

  <style>
    body {
      background-color: #09090b;
      margin: 0;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .mask-radial {
      mask-image: radial-gradient(circle at center, black, transparent 80%);
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(24, 24, 27, 0.2);
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #52525b;
    }

    /* Font Class for exact style matching */
    .font-gothic {
      font-family: 'UnifrakturMaguntia', cursive;
    }

    /* Glassmorphism Utilities */
    .glass-panel {
      background: rgba(24, 24, 27, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
