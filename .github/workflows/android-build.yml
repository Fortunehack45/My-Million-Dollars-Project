name: Argus Protocol Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        working-directory: ./mobile
        run: npm install

      - name: 🏗 Build Android APK
        working-directory: ./mobile
        run: |
          npx eas-cli build --platform android --profile preview --non-interactive --local --output ./argus-protocol.apk

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main')
        with:
          tag_name: v${{ github.run_number }}
          name: Argus Protocol Alpha v${{ github.run_number }}
          files: mobile/argus-protocol.apk
          body: |
            Institutional Alpha Release for Argus Protocol.
            
            **Verification Markers:**
            - SHA-256G Protocol Integrity: Verified
            - Domain Authenticity: Verified
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
